<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Pirate Ship Battle</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div id="app">

  <!-- TOP 1/3: Battle scene -->
  <section id="battle-scene">

    <div class="ship-panel" id="player-ship">
      <div class="ship-name">⚓ Your Ship</div>
      <div class="ship-visual">⛵</div>
      <div class="bar-row">
        <span class="bar-label">❤️</span>
        <div class="bar-track"><div class="health-fill" style="width:100%"></div></div>
        <span class="health-val">100/100</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">🛡️</span>
        <div class="bar-track"><div class="shield-fill" style="width:100%"></div></div>
        <span class="shield-val">30</span>
      </div>
      <span class="fire-badge"></span>
    </div>

    <div id="vs">VS</div>

    <div class="ship-panel" id="ai-ship">
      <div class="ship-name">💀 Enemy Ship</div>
      <div class="ship-visual">⛵</div>
      <div class="bar-row">
        <span class="bar-label">❤️</span>
        <div class="bar-track"><div class="health-fill" style="width:100%"></div></div>
        <span class="health-val">100/100</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">🛡️</span>
        <div class="bar-track"><div class="shield-fill" style="width:100%"></div></div>
        <span class="shield-val">30</span>
      </div>
      <span class="fire-badge"></span>
    </div>

  </section>

  <!-- BOTTOM 2/3: Dice area -->
  <section id="dice-area">

    <!-- Enemy dice zone (top) -->
    <div class="dice-zone" id="enemy-zone">
      <div class="canvas-wrap" id="ai-canvas-wrap">
        <canvas id="ai-canvas"></canvas>
        <div class="dice-overlay" id="ai-overlay"></div>
      </div>
    </div>

    <!-- Turn flash label sits on the divider between zones -->
    <div id="turn-flash"></div>

    <!-- Player dice zone (bottom) -->
    <div class="dice-zone" id="player-zone">
      <div class="canvas-wrap" id="player-canvas-wrap">
        <canvas id="player-canvas"></canvas>
        <div class="dice-overlay" id="player-overlay"></div>
      </div>
      <button id="roll-btn">🎲 Roll Cannons</button>
    </div>

  </section>

</div>

<!-- Game Over overlay -->
<div id="gameover-overlay">
  <div class="gameover-title"></div>
  <button id="restart-btn">Play Again</button>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
